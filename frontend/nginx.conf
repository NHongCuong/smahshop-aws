server {
    listen 80;
    server_name 54.254.229.136;
    # Tự động chuyển hướng mọi yêu cầu từ http sang https
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name 54.254.229.136;

    # Đường dẫn đến file chứng chỉ đã copy vào ở Bước 2
    #ssl_certificate /etc/nginx/nginx-selfsigned.crt;
    #ssl_certificate_key /etc/nginx/nginx-selfsigned.key;

    ssl_certificate /etc/nginx/ssl/tls.crt;
    ssl_certificate_key /etc/nginx/ssl/tls.key;

    # Cấu hình bảo mật SSL tối ưu
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 1. Phục vụ Frontend
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. Reverse Proxy sang Backend (Sửa lỗi 405 & Link Data)
    location /api/ {
        proxy_pass http://smashshop-backend-service.application-deployment.svc.cluster.local;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_method $request_method;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
    }
}
